<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #f3f4f6; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 40px; max-width: 500px; width: 100%; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        .avatar { width: 80px; height: 80px; background: #e0e7ff; color: #4f46e5; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; margin: 0 auto 20px auto; font-weight: bold; }
        h2 { color: #1f2937; margin-bottom: 8px; }
        .info-box { background: #f9fafb; border-radius: 8px; padding: 15px; margin: 20px 0; text-align: left; border: 1px solid #f3f4f6; }
        .info-box p { margin: 8px 0; color: #4b5563; font-size: 15px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: all 0.2s; }
        .btn-game { background: #10b981; color: white; }
        .btn-game:hover { background: #059669; }
        .btn-forum { background: #3b82f6; color: white; }
        .btn-forum:hover { background: #2563eb; }
        .btn-logout { background: #ef4444; color: white; }
        .btn-logout:hover { background: #dc2626; }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar" id="user-initial">U</div>
    <h2>歡迎回來！</h2>
    <div class="info-box" id="user-info">系統載入中...</div>
    
    <div class="btn-group">
        <button class="btn-game" onclick="location.href='/game.html'">🎮 進入貪吃蛇爭霸戰</button>
        <button class="btn-forum" onclick="location.href='/forum.html'">💬 前往社群討論區</button>
        <button class="btn-logout" onclick="logout()">安全登出</button>
    </div>
</div>

<script>
    async function checkLogin() {
        const res = await fetch('/auth/current-user');
        const data = await res.json();
        
        if (data.loggedIn) {
            document.getElementById('user-initial').innerText = data.user.name.charAt(0).toUpperCase();
            document.getElementById('user-info').innerHTML = `
                <p><strong>👤 用戶名稱：</strong> ${data.user.name}</p>
                <p><strong>✉️ 電子信箱：</strong> ${data.user.email}</p>
            `;
        } else {
            alert('請先登入！');
            window.location.href = '/';
        }
    }

    async function logout() {
        await fetch('/auth/logout');
        window.location.href = '/';
    }
    checkLogin();
</script>
</body>
</html>
