<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 50px; text-align: center; }
        .card { background: white; padding: 40px; max-width: 500px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background: #bd2130; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎉 歡迎回來！</h2>
    <p>這是你的雲端個人後台。</p>
    <hr>
    <div id="user-info">載入中...</div>
    <button onclick="logout()">安全登出</button>
</div>

<script>
    // 進入頁面時，先向後端檢查目前有沒有登入 Session
    async function checkLogin() {
        const res = await fetch('/auth/current-user');
        const data = await res.json();
        
        if (data.loggedIn) {
            document.getElementById('user-info').innerHTML = `
                <p><strong>使用者姓名：</strong> ${data.user.name}</p>
                <p><strong>Email 帳號：</strong> ${data.user.email}</p>
            `;
        } else {
            // 未登入，直接踢回首頁
            alert('請先登入！');
            window.location.href = '/';
        }
    }

    // 處理登出
    async function logout() {
        const res = await fetch('/auth/logout');
        const data = await res.json();
        alert(data.message);
        window.location.href = '/';
    }

    // 執行檢查
    checkLogin();
</script>
</body>
</html>
