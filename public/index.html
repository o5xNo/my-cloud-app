<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端驗證系統 - 登入/註冊</title>
    <style>
        :root { --primary: #4f46e5; --primary-hover: #4338ca; --bg: #f3f4f6; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; transition: all 0.3s ease; }
        h2 { text-align: center; color: #1f2937; margin-bottom: 24px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #4b5563; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: background 0.2s; }
        button:hover { background: var(--primary-hover); }
        .switch-btn { text-align: center; margin-top: 20px; color: var(--primary); cursor: pointer; font-size: 14px; text-decoration: none; font-weight: 500; }
        .switch-btn:hover { text-decoration: underline; }
        .error-msg { color: #dc2626; text-align: center; margin-bottom: 15px; font-size: 14px; display: none; background: #fee2e2; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <h2>會員登入</h2>
        <div id="login-error" class="error-msg"></div>
        <form id="login-form">
            <div class="form-group">
                <label>Email 帳號</label>
                <input type="email" id="login-email" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="login-password" placeholder="請輸入密碼" required>
            </div>
            <button type="submit">登入系統</button>
        </form>
        <div class="switch-btn" onclick="toggleForm()">還沒有帳號？前往註冊</div>
    </div>

    <div id="register-box" style="display: none;">
        <h2>建立新帳號</h2>
        <div id="register-error" class="error-msg"></div>
        <form id="register-form">
            <div class="form-group">
                <label>使用者姓名</label>
                <input type="text" id="reg-name" placeholder="王小明" required>
            </div>
            <div class="form-group">
                <label>Email 帳號</label>
                <input type="email" id="reg-email" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label>設定密碼</label>
                <input type="password" id="reg-password" placeholder="至少 6 位字元" required>
            </div>
            <button type="submit">註冊帳號</button>
        </form>
        <div class="switch-btn" onclick="toggleForm()">已有帳號？前往登入</div>
    </div>
</div>

<script>
    function toggleForm() {
        const loginBox = document.getElementById('login-box');
        const registerBox = document.getElementById('register-box');
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('register-error').style.display = 'none';
        if (loginBox.style.display === 'none') {
            loginBox.style.display = 'block';
            registerBox.style.display = 'none';
        } else {
            loginBox.style.display = 'none';
            registerBox.style.display = 'block';
        }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const errorDiv = document.getElementById('register-error');

        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        
        errorDiv.style.display = 'block';
        if (res.status === 201) {
            errorDiv.style.background = '#ecfdf5';
            errorDiv.style.color = '#059669';
            errorDiv.innerText = data.message + ' 請切換至登入。';
        } else {
            errorDiv.style.background = '#fee2e2';
            errorDiv.style.color = '#dc2626';
            errorDiv.innerText = data.message;
        }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('login-error');

        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (res.ok) {
            window.location.href = '/dashboard.html';
        } else {
            errorDiv.style.display = 'block';
            errorDiv.innerText = '登入失敗，請檢查帳號密碼';
        }
    });
</script>
</body>
</html>
